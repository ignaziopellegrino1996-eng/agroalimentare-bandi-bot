name: daily

on:
  schedule:
    # 08:00 Europe/Rome = 07:00 UTC (CET, winter)
    - cron: "0 7 * * *"
    # 08:00 Europe/Rome = 06:00 UTC (CEST, summer/DST)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore SQLite state cache
        uses: actions/cache@v4
        with:
          path: data/state.sqlite3
          key: agrobandi-sqlite-${{ runner.os }}-${{ github.ref_name }}-${{ steps.date.outputs.date }}
          restore-keys: |
            agrobandi-sqlite-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── MANUAL dispatch: ping + run without time guard ──────────────────────
      - name: Telegram ping (MANUAL)
        if: github.event_name == 'workflow_dispatch'
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🌾 Ping da GitHub Actions ✅ — Agroalimentare Bot"

      - name: Run daily check (MANUAL)
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p data
          python run.py \
            --once \
            --config config.example.yaml \
            --sources sources.yaml \
            --log-level INFO

      # ── SCHEDULED: guarded at 08:00 Rome ±10 min ────────────────────────────
      - name: Run daily check (SCHEDULED)
        if: github.event_name != 'workflow_dispatch'
        run: |
          mkdir -p data
          python run.py \
            --once \
            --config config.example.yaml \
            --sources sources.yaml \
            --expect-local-time 08:00 \
            --log-level INFO
